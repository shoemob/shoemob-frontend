<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOEMOB | Luxury Streetwear</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="menu-trigger" onclick="toggleMenu()">☰</div>
        <div class="logo">SHOEMOB</div>
        <div class="nav-icons">
            <span onclick="alert('Search coming soon!')">🔍</span>
            <span class="cart-icon" onclick="toggleCart()">🛒 <small id="cart-count">0</small></span>
        </div>
    </header>

    <div id="side-menu" class="sidebar">
        <span class="close-btn" onclick="toggleMenu()">×</span>
        <div class="menu-content">
            <h2>CATEGORIES</h2>
            <a href="#">Luxury Sneakers</a>
            <a href="#">Streetwear Shoes</a>
            <a href="#">Premium Tech</a>
            <a href="#">New Arrivals</a>
        </div>
    </div>

    <div id="cart-sidebar" class="sidebar right">
        <span class="close-btn" onclick="toggleCart()">×</span>
        <div class="menu-content">
            <h2>YOUR BAG</h2>
            <div id="cart-items">Your bag is empty.</div>
            <div class="cart-footer">
                <button class="checkout-btn">PROCEED TO CHECKOUT</button>
            </div>
        </div>
    </div>

    <section class="hero">
        <h1>UNLEASH LUXURY</h1>
        <p>Curated Streetwear & Premium Tech Accessories</p>
        <div class="hero-btns">
            <button class="btn btn-black">SHOP SNEAKERS</button>
            <button class="btn btn-blue">SHOP TECH</button>
        </div>
    </section>

    <section class="products-section">
        <h2>FEATURED COLLECTIONS</h2>
        <div id="product-grid" class="product-grid">
            <p>Loading luxury collections...</p>
        </div>
    </section>

    <script>
        // 🛠️ Sidebar Functions
        function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); }
        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('active'); }

        // 🔗 Fetch Real Products from your Render Backend
        async function fetchProducts() {
            try {
                const res = await fetch('https://shoemob-backend.onrender.com/api/products');
                const products = await res.json();
                const grid = document.getElementById('product-grid');
                
                if(products.length === 0) {
                    grid.innerHTML = "<h3>No products live yet. Add from Admin!</h3>";
                    return;
                }

                grid.innerHTML = products.map(p => `
                    <div class="product-card">
                        <img src="${p.images[0]}" alt="${p.name}">
                        <div class="p-info">
                            <h3>${p.name}</h3>
                            <p class="category">${p.category}</p>
                            <p class="price">₹${p.price.toLocaleString()}</p>
                            <button class="add-to-cart" onclick="addToCart('${p.name}')">ADD TO BAG</button>
                        </div>
                    </div>
                `).join('');
            } catch (err) { console.error("Error fetching products", err); }
        }

        let cart = [];
        function addToCart(name) {
            cart.push(name);
            document.getElementById('cart-count').innerText = cart.length;
            toggleCart();
            document.getElementById('cart-items').innerHTML = cart.map(item => `<div class="cart-item">${item}</div>`).join('');
        }

        fetchProducts();
    </script>
</body>
</html>
